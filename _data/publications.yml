# =============================================================================
# Publications data — private editing notes
# =============================================================================
# This file is the single source of truth for the /publications/ page.
# The notes in this header are NOT shown on the public site (YAML comments
# are stripped by Jekyll). Edit this file, commit, and the page rebuilds.
#
# Add an entry per publication below the `entries:` divider. Order doesn't
# matter — the page groups and sorts automatically (by year, descending,
# within each status group).
#
# -----------------------------------------------------------------------------
# Required fields
# -----------------------------------------------------------------------------
#   title    : "Paper title"
#   authors  : "Quinones CJ, Last F, Last F"   # comma-separated; "Quinones CJ"
#                                              # is auto-bolded on the page
#   year     : 2026                            # publication / target year
#   status   : one of:
#                published        — accepted and published
#                in_press         — accepted, awaiting publication
#                under_review     — submitted, in peer review
#                submitted        — submitted, awaiting first decision
#                in_preparation   — drafting / not yet submitted
#
# -----------------------------------------------------------------------------
# Optional fields
# -----------------------------------------------------------------------------
#   venue    : "Journal name"            # journal / conference
#   doi      : "10.1234/xyz"             # without the https://doi.org/ prefix
#   url      : "https://..."             # any link (used if no DOI)
#   pmid     : "12345678"                # PubMed ID
#   notes    : "First-author"            # short note shown after the entry
#   bold_self: false                     # set to disable auto-bolding for this
#                                        # entry (default: true)
#
# -----------------------------------------------------------------------------
# Template — copy, paste, edit
# -----------------------------------------------------------------------------
# - title: ""
#   authors: "Quinones CJ, "
#   venue: ""
#   year: 2026
#   status: under_review
#   doi: ""
#   notes: ""
# =============================================================================

