# Publications
# ------------
# Add a new entry below for each publication. Order doesn't matter — the page
# groups by status automatically.
#
# Required fields:
#   title    : "Paper title"
#   authors  : "Quinones CJ, Last F, Last F"   # comma-separated; bold yourself
#   year     : 2026                            # year (or "2026" for in-prep)
#   status   : one of:
#                published        — accepted and published
#                in_press         — accepted, awaiting publication
#                under_review     — submitted, in peer review
#                submitted        — submitted, awaiting first decision
#                in_preparation   — drafting / not yet submitted
#
# Optional fields:
#   venue    : "Journal name"            # journal / conference
#   doi      : "10.1234/xyz"             # without the https://doi.org/ prefix
#   url      : "https://..."             # any link (if no DOI)
#   pmid     : "12345678"                # PubMed ID
#   notes    : "First-author"            # any short note shown after the entry
#   bold_self: true                      # leave true to bold "Quinones CJ" (default)

- title: "Example published paper — replace this entry"
  authors: "Quinones CJ, Smith AB, Doe CD"
  venue: "Annals of Family Medicine"
  year: 2026
  status: published
  doi: "10.1234/example"
  notes: "First-author"

- title: "Example paper currently under peer review"
  authors: "Quinones CJ, Doe CD"
  venue: "Journal of Primary Care"
  year: 2026
  status: under_review

- title: "Example paper in preparation"
  authors: "Quinones CJ"
  year: 2026
  status: in_preparation
